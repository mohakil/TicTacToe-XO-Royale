name: tictactoe_xo_royale
description: "A premium Tic Tac Toe mobile game with modern UI/UX and Material 3 design"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^16.2.0
  
  # UI & Animations
  flutter_animate: ^4.5.2
  google_fonts: ^6.3.0
  shimmer: ^3.0.0
  confetti: ^0.8.0
  carousel_slider: ^5.1.1
  smooth_page_indicator: ^1.2.1
  
  # Audio & Haptics
  just_audio: ^0.10.4
  vibration: ^3.1.3
  
  # Storage & Data
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  http: ^1.5.0
  
  # Utilities
  equatable: ^2.0.5
  collection: ^1.19.1
  intl: ^0.20.2
  vector_math: ^2.2.0
  
  # Device Info
  device_info_plus: ^11.5.0
  package_info_plus: ^8.3.1
  
  # Code Generation
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.5
  
  # Linting
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/
    - assets/fonts/
  
  # Fonts
  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-VariableFont_wght.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-VariableFont_wght.ttf
